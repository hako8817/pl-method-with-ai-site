<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 640" width="960" height="640"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10B981"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#F8FAFC"/>

  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">팀 자산은 개인 기록 위에 올라가는 층이다</text>
  <text x="480" y="58" text-anchor="middle" font-size="11.5" fill="#6B7280">팀 확장의 목적은 기록을 많이 모으는 것이 아니라, 설명 비용을 줄이고 같은 질문에 같은 토론을 반복하지 않게 만드는 것이다</text>

  <rect x="80" y="102" width="260" height="140" rx="16" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="210" y="136" text-anchor="middle" font-size="18" font-weight="bold" fill="#1D4ED8">개인 PKM</text>
  <text x="210" y="163" text-anchor="middle" font-size="11" fill="#2563EB">Daily에서 입력을 받고</text>
  <text x="210" y="181" text-anchor="middle" font-size="11" fill="#2563EB">Decision을 남기고</text>
  <text x="210" y="199" text-anchor="middle" font-size="11" fill="#2563EB">Knowledge를 쌓고</text>
  <text x="210" y="217" text-anchor="middle" font-size="11" fill="#2563EB">Distill로 패턴을 만든다</text>

  <rect x="390" y="102" width="260" height="140" rx="16" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
  <text x="520" y="136" text-anchor="middle" font-size="18" font-weight="bold" fill="#047857">형식화된 재료</text>
  <text x="520" y="163" text-anchor="middle" font-size="11" fill="#059669">Decision Log</text>
  <text x="520" y="181" text-anchor="middle" font-size="11" fill="#059669">Case Study</text>
  <text x="520" y="199" text-anchor="middle" font-size="11" fill="#059669">체크리스트 / 가이드</text>
  <text x="520" y="217" text-anchor="middle" font-size="11" fill="#059669">컨텍스트 패키지 샘플</text>

  <rect x="700" y="102" width="180" height="140" rx="16" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2"/>
  <text x="790" y="136" text-anchor="middle" font-size="18" font-weight="bold" fill="#6D28D9">팀 자산</text>
  <text x="790" y="163" text-anchor="middle" font-size="11" fill="#7C3AED">공통 판단 기준</text>
  <text x="790" y="181" text-anchor="middle" font-size="11" fill="#7C3AED">온보딩 기준</text>
  <text x="790" y="199" text-anchor="middle" font-size="11" fill="#7C3AED">반복 질문 감소</text>
  <text x="790" y="217" text-anchor="middle" font-size="11" fill="#7C3AED">설명 비용 절감</text>

  <path d="M340,172 L390,172" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <path d="M650,172 L700,172" fill="none" stroke="#10B981" stroke-width="2.5" marker-end="url(#arr-green)"/>

  <rect x="120" y="300" width="320" height="170" rx="16" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="280" y="334" text-anchor="middle" font-size="17" font-weight="bold" fill="#B45309">팀으로 올릴 가치가 큰 것</text>
  <text x="280" y="362" text-anchor="middle" font-size="11" fill="#C2410C">반복되는 의사결정 기준</text>
  <text x="280" y="381" text-anchor="middle" font-size="11" fill="#C2410C">재사용된 체크리스트</text>
  <text x="280" y="400" text-anchor="middle" font-size="11" fill="#C2410C">설명 비용을 줄여주는 개념 노트</text>
  <text x="280" y="419" text-anchor="middle" font-size="11" fill="#C2410C">온보딩에 필요한 케이스와 기준</text>
  <text x="280" y="438" text-anchor="middle" font-size="11" fill="#C2410C">특정 문제 유형에 대한 플레이북</text>

  <rect x="520" y="300" width="320" height="170" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="680" y="334" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">개인에 남겨둘 것이 더 나은 것</text>
  <text x="680" y="362" text-anchor="middle" font-size="11" fill="#475569">일시적인 개인 메모</text>
  <text x="680" y="381" text-anchor="middle" font-size="11" fill="#475569">미완성 생각</text>
  <text x="680" y="400" text-anchor="middle" font-size="11" fill="#475569">아직 검증되지 않은 가설</text>
  <text x="680" y="419" text-anchor="middle" font-size="11" fill="#475569">민감한 맥락과 일회성 실험</text>
  <text x="680" y="438" text-anchor="middle" font-size="11" fill="#475569">통째 공개 시 잡음이 되는 기록</text>

  <path d="M520,242 L280,300" fill="none" stroke="#F59E0B" stroke-width="2.2" marker-end="url(#arr)"/>
  <path d="M520,242 L680,300" fill="none" stroke="#9CA3AF" stroke-width="2.2" marker-end="url(#arr)"/>

  <rect x="150" y="518" width="660" height="70" rx="14" fill="#F0FDF4" stroke="#34D399" stroke-width="2"/>
  <text x="480" y="546" text-anchor="middle" font-size="17" font-weight="bold" fill="#047857">전면 공유보다 샘플 공유가 현실적이다</text>
  <text x="480" y="569" text-anchor="middle" font-size="11" fill="#059669">개인 볼트를 통째로 공개하기보다, 팀에 필요한 샘플과 기준을 공유하고 그 배후의 운영 방법을 설명하는 편이 더 효과적이다</text>
</svg>
