<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 600" width="960" height="600"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="960" height="600" fill="#F8FAFC"/>

  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">현재 원고는 프롤로그 질문에서 시작해 PART 1-7과 BASE 실습으로 이어진다</text>
  <text x="480" y="58" text-anchor="middle" font-size="11" fill="#6B7280">위는 책의 읽기 흐름이고, 아래는 바로 따라해볼 독자를 위한 BASE 시작 순서다</text>

  <text x="160" y="104" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F2937">본문 읽기 흐름</text>

  <rect x="34" y="124" width="148" height="96" rx="12" fill="#EDE9FE" stroke="#A78BFA" stroke-width="2"/>
  <text x="108" y="154" text-anchor="middle" font-size="18" font-weight="bold" fill="#6D28D9">질문 설정</text>
  <text x="108" y="178" text-anchor="middle" font-size="11" fill="#5B21B6">프롤로그</text>
  <text x="108" y="196" text-anchor="middle" font-size="11" fill="#5B21B6">기획자는 PKM으로</text>
  <text x="108" y="212" text-anchor="middle" font-size="11" fill="#5B21B6">무엇을 어떻게 관리하는가</text>

  <rect x="198" y="124" width="148" height="96" rx="12" fill="#E0F2FE" stroke="#38BDF8" stroke-width="2"/>
  <text x="272" y="154" text-anchor="middle" font-size="18" font-weight="bold" fill="#0369A1">문제의식</text>
  <text x="272" y="178" text-anchor="middle" font-size="11" fill="#0C4A6E">PART 1</text>
  <text x="272" y="196" text-anchor="middle" font-size="11" fill="#0C4A6E">왜 판단 인프라가 필요하고</text>
  <text x="272" y="212" text-anchor="middle" font-size="11" fill="#0C4A6E">AI 시대에 왜 더 중요해지는가</text>

  <rect x="362" y="124" width="148" height="96" rx="12" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="436" y="154" text-anchor="middle" font-size="18" font-weight="bold" fill="#1D4ED8">관리 대상</text>
  <text x="436" y="178" text-anchor="middle" font-size="11" fill="#1E3A8A">PART 2</text>
  <text x="436" y="196" text-anchor="middle" font-size="11" fill="#1E3A8A">Evidence / Decision</text>
  <text x="436" y="212" text-anchor="middle" font-size="11" fill="#1E3A8A">Knowledge / Result</text>

  <rect x="526" y="124" width="170" height="96" rx="12" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
  <text x="611" y="154" text-anchor="middle" font-size="18" font-weight="bold" fill="#047857">운영 사이클</text>
  <text x="611" y="178" text-anchor="middle" font-size="11" fill="#065F46">PART 3-6</text>
  <text x="611" y="196" text-anchor="middle" font-size="11" fill="#065F46">Capture → Organize</text>
  <text x="611" y="212" text-anchor="middle" font-size="11" fill="#065F46">→ Distill → Express</text>

  <rect x="712" y="124" width="136" height="96" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="780" y="154" text-anchor="middle" font-size="18" font-weight="bold" fill="#B45309">운영/확장</text>
  <text x="780" y="178" text-anchor="middle" font-size="11" fill="#92400E">PART 7</text>
  <text x="780" y="196" text-anchor="middle" font-size="11" fill="#92400E">루틴, 팀 확장,</text>
  <text x="780" y="212" text-anchor="middle" font-size="11" fill="#92400E">이식, 자산화</text>

  <rect x="864" y="124" width="62" height="96" rx="12" fill="#F5E8FF" stroke="#C084FC" stroke-width="2"/>
  <text x="895" y="154" text-anchor="middle" font-size="16" font-weight="bold" fill="#7E22CE">BASE</text>
  <text x="895" y="178" text-anchor="middle" font-size="10" fill="#6B21A8">샘플</text>
  <text x="895" y="194" text-anchor="middle" font-size="10" fill="#6B21A8">도구</text>
  <text x="895" y="210" text-anchor="middle" font-size="10" fill="#6B21A8">실습</text>

  <path d="M182,172 L198,172" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M346,172 L362,172" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M510,172 L526,172" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M696,172 L712,172" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M848,172 L864,172" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>

  <text x="160" y="294" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F2937">BASE 실습 흐름</text>

  <rect x="42" y="314" width="92" height="78" rx="10" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="88" y="346" text-anchor="middle" font-size="17" font-weight="bold" fill="#1D4ED8">B1</text>
  <text x="88" y="368" text-anchor="middle" font-size="10" fill="#1E3A8A">왜 Obsidian인가</text>

  <rect x="148" y="314" width="92" height="78" rx="10" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="194" y="346" text-anchor="middle" font-size="17" font-weight="bold" fill="#1D4ED8">B2</text>
  <text x="194" y="368" text-anchor="middle" font-size="10" fill="#1E3A8A">최소 세팅</text>

  <rect x="254" y="314" width="92" height="78" rx="10" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="300" y="346" text-anchor="middle" font-size="17" font-weight="bold" fill="#1D4ED8">B3</text>
  <text x="300" y="368" text-anchor="middle" font-size="10" fill="#1E3A8A">최소 개념</text>

  <rect x="360" y="314" width="92" height="78" rx="10" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="406" y="346" text-anchor="middle" font-size="17" font-weight="bold" fill="#1D4ED8">B4</text>
  <text x="406" y="368" text-anchor="middle" font-size="10" fill="#1E3A8A">볼트 구조</text>

  <rect x="486" y="314" width="92" height="78" rx="10" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
  <text x="532" y="346" text-anchor="middle" font-size="17" font-weight="bold" fill="#047857">B5</text>
  <text x="532" y="368" text-anchor="middle" font-size="10" fill="#065F46">핵심 노트 샘플</text>

  <rect x="592" y="314" width="92" height="78" rx="10" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
  <text x="638" y="346" text-anchor="middle" font-size="17" font-weight="bold" fill="#047857">B6</text>
  <text x="638" y="368" text-anchor="middle" font-size="10" fill="#065F46">OS 샘플 읽기</text>

  <rect x="698" y="314" width="92" height="78" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="744" y="346" text-anchor="middle" font-size="17" font-weight="bold" fill="#B45309">B7</text>
  <text x="744" y="368" text-anchor="middle" font-size="10" fill="#92400E">템플릿 기준</text>

  <rect x="804" y="314" width="110" height="78" rx="10" fill="#F5E8FF" stroke="#C084FC" stroke-width="2"/>
  <text x="859" y="346" text-anchor="middle" font-size="17" font-weight="bold" fill="#7E22CE">B8 / B9</text>
  <text x="859" y="368" text-anchor="middle" font-size="10" fill="#6B21A8">Daily / AI 체크</text>

  <path d="M134,353 L148,353" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M240,353 L254,353" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M346,353 L360,353" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M452,353 L486,353" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M578,353 L592,353" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M684,353 L698,353" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M790,353 L804,353" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="98" y="454" width="764" height="94" rx="12" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="480" y="484" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">추천 읽기 방식</text>
  <text x="480" y="508" text-anchor="middle" font-size="11" fill="#4B5563">본문은 프롤로그 질문에서 시작해 PART 1-7의 논리를 따라가고, BASE는 그 구조를 바로 자기 환경에 재현해보는 실습 흐름이다</text>
  <text x="480" y="526" text-anchor="middle" font-size="11" fill="#4B5563">둘을 함께 보면 개념, 샘플, 실행 기준이 끊기지 않고 연결된다</text>
  <text x="480" y="542" text-anchor="middle" font-size="11" fill="#4B5563">용어 확인은 B10, 방법론 비교가 필요하면 B11을 중간중간 참조하면 된다</text>
</svg>

