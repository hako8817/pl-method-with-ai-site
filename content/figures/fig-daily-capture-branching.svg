<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 980 540" width="980" height="540"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>
  <rect width="980" height="540" fill="#F8FAFC"/>

  <text x="490" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">Daily Capture는 입력 허브다</text>
  <text x="490" y="58" text-anchor="middle" font-size="11" fill="#6B7280">Daily는 종착지가 아니라 분기 가능한 입력을 받는 허브다</text>

  <rect x="40" y="110" width="230" height="300" rx="12" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2"/>
  <text x="155" y="140" text-anchor="middle" font-size="18" font-weight="bold" fill="#1D4ED8">오늘의 입력</text>
  <text x="70" y="182" font-size="12" fill="#2563EB">• 회의 메모</text>
  <text x="70" y="210" font-size="12" fill="#2563EB">• VOC, 로그, 관찰</text>
  <text x="70" y="238" font-size="12" fill="#2563EB">• 오늘 내린 판단</text>
  <text x="70" y="266" font-size="12" fill="#2563EB">• 새로 들은 용어와 개념</text>
  <text x="70" y="294" font-size="12" fill="#2563EB">• 실행 결과와 후속 액션</text>
  <text x="155" y="344" text-anchor="middle" font-size="11" fill="#3B82F6">형식은 짧아도 된다</text>
  <text x="155" y="362" text-anchor="middle" font-size="11" fill="#3B82F6">중요한 것은 나중에 분기 가능하게 남기는 것</text>

  <rect x="360" y="120" width="260" height="304" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
  <text x="490" y="148" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">Daily Capture 분기</text>

  <rect x="390" y="172" width="200" height="40" rx="8" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="490" y="197" text-anchor="middle" font-size="12" fill="#1D4ED8">사실 캡처</text>

  <rect x="390" y="224" width="200" height="40" rx="8" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="490" y="249" text-anchor="middle" font-size="12" fill="#6D28D9">의사결정 기록</text>

  <rect x="390" y="276" width="200" height="40" rx="8" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="490" y="301" text-anchor="middle" font-size="12" fill="#047857">용어·개념 메모</text>

  <rect x="390" y="328" width="200" height="40" rx="8" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="490" y="353" text-anchor="middle" font-size="12" fill="#B45309">확인 필요 / 보류</text>

  <text x="490" y="388" text-anchor="middle" font-size="10.5" fill="#6B7280">Action은 Daily 안에서 닫히되</text>
  <text x="490" y="404" text-anchor="middle" font-size="10.5" fill="#6B7280">발견이 생기면 다시 승격한다</text>

  <rect x="710" y="96" width="230" height="92" rx="12" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2"/>
  <text x="825" y="126" text-anchor="middle" font-size="16" font-weight="bold" fill="#6D28D9">Decision OS</text>
  <text x="825" y="150" text-anchor="middle" font-size="11" fill="#7C3AED">Evidence, Decision으로</text>
  <text x="825" y="168" text-anchor="middle" font-size="11" fill="#7C3AED">구조화된다</text>

  <rect x="710" y="216" width="230" height="92" rx="12" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
  <text x="825" y="246" text-anchor="middle" font-size="16" font-weight="bold" fill="#047857">Knowledge</text>
  <text x="825" y="270" text-anchor="middle" font-size="11" fill="#059669">용어, 개념, 기법, 체크리스트로</text>
  <text x="825" y="288" text-anchor="middle" font-size="11" fill="#059669">승격된다</text>

  <rect x="710" y="336" width="230" height="92" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="825" y="366" text-anchor="middle" font-size="16" font-weight="bold" fill="#B45309">Hold / Action</text>
  <text x="825" y="390" text-anchor="middle" font-size="11" fill="#C2410C">추가 확인 후 판단하거나</text>
  <text x="825" y="408" text-anchor="middle" font-size="11" fill="#C2410C">그날의 액션으로 닫는다</text>

  <line x1="270" y1="260" x2="360" y2="260" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="590" y1="192" x2="710" y2="142" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="590" y1="296" x2="710" y2="262" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="590" y1="348" x2="710" y2="382" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="120" y="446" width="740" height="48" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="490" y="472" text-anchor="middle" font-size="11" fill="#374151">좋은 Daily는 길게 쓰는 Daily가 아니라, Evidence / Decision / Knowledge / Hold로 흘려보낼 수 있게 쓰는 Daily다</text>
</svg>
