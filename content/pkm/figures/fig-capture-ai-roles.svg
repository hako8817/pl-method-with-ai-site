<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 660" width="960" height="660"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10B981"/>
    </marker>
  </defs>

  <rect width="960" height="660" fill="#F8FAFC"/>

  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">Capture에서 AI는 입력을 정리하고 분기와 초안을 돕는 협업자다</text>
  <text x="480" y="58" text-anchor="middle" font-size="11.5" fill="#6B7280">사람은 의미와 맥락을 최종 판단하고, AI는 그 판단이 더 빨리 가능하도록 입력을 구조화하고 후보를 제안한다</text>

  <rect x="70" y="92" width="240" height="110" rx="14" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="190" y="126" text-anchor="middle" font-size="18" font-weight="bold" fill="#1D4ED8">Daily Capture 입력</text>
  <text x="190" y="153" text-anchor="middle" font-size="11" fill="#2563EB">회의 메모, 링크, TODO,</text>
  <text x="190" y="171" text-anchor="middle" font-size="11" fill="#2563EB">반쯤 정리된 문장과 생각이</text>
  <text x="190" y="189" text-anchor="middle" font-size="11" fill="#2563EB">한데 섞여 들어온다</text>

  <rect x="350" y="82" width="540" height="320" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="620" y="112" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">Capture에서 AI가 맡는 5가지 일</text>

  <rect x="382" y="136" width="226" height="74" rx="12" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="495" y="163" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">1. 입력 정리</text>
  <text x="495" y="184" text-anchor="middle" font-size="10.5" fill="#2563EB">읽기 쉬운 형태로 정리하고</text>
  <text x="495" y="200" text-anchor="middle" font-size="10.5" fill="#2563EB">중복과 거친 표현을 다듬는다</text>

  <rect x="632" y="136" width="226" height="74" rx="12" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="745" y="163" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">2. 1차 분기</text>
  <text x="745" y="184" text-anchor="middle" font-size="10.5" fill="#2563EB">Evidence, Decision, Knowledge 후보,</text>
  <text x="745" y="200" text-anchor="middle" font-size="10.5" fill="#2563EB">Action, 보류 항목으로 먼저 나눈다</text>

  <rect x="382" y="226" width="226" height="74" rx="12" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="495" y="253" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">3. 기존 노트 탐색</text>
  <text x="495" y="274" text-anchor="middle" font-size="10.5" fill="#059669">신규보다 업데이트가 맞는지</text>
  <text x="495" y="290" text-anchor="middle" font-size="10.5" fill="#059669">먼저 찾고 제안한다</text>

  <rect x="632" y="226" width="226" height="74" rx="12" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="745" y="253" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">4. 유형 / 분류 후보 제안</text>
  <text x="745" y="274" text-anchor="middle" font-size="10.5" fill="#059669">노트 유형, 파일명, 분류 위치의</text>
  <text x="745" y="290" text-anchor="middle" font-size="10.5" fill="#059669">초안을 제시한다</text>

  <rect x="507" y="316" width="226" height="74" rx="12" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="620" y="343" text-anchor="middle" font-size="14" font-weight="bold" fill="#6D28D9">5. 초안 생성 / 확장 포인트 제안</text>
  <text x="620" y="364" text-anchor="middle" font-size="10.5" fill="#7C3AED">첫 노트 초안을 만들고,</text>
  <text x="620" y="380" text-anchor="middle" font-size="10.5" fill="#7C3AED">무엇을 더 확인할지 함께 제안한다</text>

  <path d="M310,147 L350,147" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M310,168 C334,168 344,184 382,184" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M310,186 C334,186 344,262 382,262" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="160" y="416" width="260" height="98" rx="14" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="290" y="447" text-anchor="middle" font-size="17" font-weight="bold" fill="#B45309">사람의 최종 판단</text>
  <text x="290" y="472" text-anchor="middle" font-size="11" fill="#C2410C">왜 중요한지, 어떤 맥락인지,</text>
  <text x="290" y="490" text-anchor="middle" font-size="11" fill="#C2410C">신규/업데이트가 맞는지는</text>
  <text x="290" y="508" text-anchor="middle" font-size="11" fill="#C2410C">기획자가 최종 결정한다</text>

  <rect x="490" y="416" width="370" height="166" rx="14" fill="#F0FDF4" stroke="#34D399" stroke-width="2"/>
  <text x="675" y="446" text-anchor="middle" font-size="17" font-weight="bold" fill="#047857">다음 단계로 넘길 수 있는 형태</text>

  <rect x="518" y="468" width="96" height="44" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="566" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">Evidence</text>

  <rect x="626" y="468" width="96" height="44" rx="10" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="674" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">Decision</text>

  <rect x="734" y="468" width="96" height="44" rx="10" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="782" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#047857">Knowledge</text>

  <rect x="572" y="526" width="96" height="44" rx="10" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="620" y="553" text-anchor="middle" font-size="13" font-weight="bold" fill="#B45309">Action</text>

  <rect x="680" y="526" width="96" height="44" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="728" y="553" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">보류</text>

  <path d="M620,390 L620,416" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M420,465 L490,465" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="110" y="608" width="740" height="32" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="480" y="629" text-anchor="middle" font-size="11" fill="#374151">Capture에서 AI의 본질적 역할은 요약이 아니라 분기다. 정리는 수단이고, 분기는 다음 흐름을 작동시키는 핵심이다</text>
</svg>
