<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 980 560" width="980" height="560"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#F8FAFC"/>
  <text x="490" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">이 책의 템플릿은 두 층으로 나뉜다</text>
  <text x="490" y="58" text-anchor="middle" font-size="11" fill="#6B7280">핵심 객체 템플릿이 PKM의 뼈대라면, 실행 산출물 템플릿은 그 위에서 만들어지는 작업 단위다</text>

  <rect x="150" y="130" width="680" height="120" rx="14" fill="#ECFDF5" stroke="#34D399" stroke-width="2.5"/>
  <text x="490" y="166" text-anchor="middle" font-size="19" font-weight="bold" fill="#047857">1층. 핵심 객체 템플릿</text>
  <text x="490" y="194" text-anchor="middle" font-size="11" fill="#059669">Evidence Note · Decision Log · Result Note · Knowledge Note · Project Hub</text>
  <text x="490" y="214" text-anchor="middle" font-size="11" fill="#059669">반복되는 판단 구조를 같은 모양으로 남기기 위한 기본 뼈대</text>

  <rect x="210" y="314" width="560" height="120" rx="14" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2.5"/>
  <text x="490" y="350" text-anchor="middle" font-size="19" font-weight="bold" fill="#1D4ED8">2층. 실행 산출물 템플릿</text>
  <text x="490" y="378" text-anchor="middle" font-size="11" fill="#2563EB">Problem Brief · PRD · Experiment Card · Release Note · Case Study</text>
  <text x="490" y="398" text-anchor="middle" font-size="11" fill="#2563EB">실제 기획과 실행에서 바로 쓰는 확장 작업 단위</text>

  <line x1="490" y1="250" x2="490" y2="314" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="532" y="270" width="220" height="50" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="642" y="289" text-anchor="middle" font-size="10.5" fill="#6B7280">핵심 객체가 먼저 안정돼야</text>
  <text x="642" y="305" text-anchor="middle" font-size="10.5" fill="#6B7280">산출물 템플릿도 흔들리지 않는다</text>

  <rect x="74" y="146" width="150" height="88" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
  <text x="149" y="177" text-anchor="middle" font-size="15" font-weight="bold" fill="#111827">샘플</text>
  <text x="149" y="200" text-anchor="middle" font-size="11" fill="#4B5563">B5, B6로</text>
  <text x="149" y="218" text-anchor="middle" font-size="11" fill="#4B5563">구조와 읽는 관점 확인</text>

  <line x1="224" y1="190" x2="150" y2="190" stroke="#9CA3AF" stroke-width="2"/>

  <rect x="756" y="330" width="150" height="88" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
  <text x="831" y="361" text-anchor="middle" font-size="15" font-weight="bold" fill="#111827">적용</text>
  <text x="831" y="384" text-anchor="middle" font-size="11" fill="#4B5563">B8 Daily와 연결해</text>
  <text x="831" y="402" text-anchor="middle" font-size="11" fill="#4B5563">실제로 반복 사용</text>

  <line x1="770" y1="374" x2="756" y2="374" stroke="#9CA3AF" stroke-width="2"/>

  <rect x="182" y="474" width="616" height="34" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="490" y="496" text-anchor="middle" font-size="11" fill="#374151">처음부터 모든 템플릿이 필요한 것은 아니다. 핵심 객체 템플릿 5개를 먼저 굳힌 뒤, 실제로 자주 만드는 산출물만 확장한다</text>
</svg>

