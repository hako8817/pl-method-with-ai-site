<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 650" width="960" height="650"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10B981"/>
    </marker>
  </defs>

  <rect width="960" height="650" fill="#F8FAFC"/>

  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">Distill에서 AI는 패턴 탐지와 후보 제안을 돕는 보조자다</text>
  <text x="480" y="58" text-anchor="middle" font-size="11.5" fill="#6B7280">AI는 새 지식을 독립적으로 발명하는 존재가 아니라, 이미 쌓인 기록들 사이에서 반복과 연결을 먼저 드러내는 역할을 맡는다</text>

  <rect x="60" y="96" width="220" height="108" rx="14" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="170" y="128" text-anchor="middle" font-size="18" font-weight="bold" fill="#1D4ED8">쌓인 기록 묶음</text>
  <text x="170" y="154" text-anchor="middle" font-size="11" fill="#2563EB">Decision Log, Evidence,</text>
  <text x="170" y="172" text-anchor="middle" font-size="11" fill="#2563EB">Result, 오래된 문서,</text>
  <text x="170" y="190" text-anchor="middle" font-size="11" fill="#2563EB">주간/프로젝트 단위 축적물</text>

  <rect x="320" y="84" width="580" height="332" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="610" y="114" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">Distill에서 AI가 맡는 4가지 일</text>

  <rect x="356" y="140" width="246" height="82" rx="12" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="479" y="169" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">1. 패턴 탐지</text>
  <text x="479" y="191" text-anchor="middle" font-size="10.5" fill="#2563EB">비슷한 Decision, 반복되는 불만,</text>
  <text x="479" y="207" text-anchor="middle" font-size="10.5" fill="#2563EB">여러 프로젝트의 공통 문제를 먼저 묶어준다</text>

  <rect x="618" y="140" width="246" height="82" rx="12" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="741" y="169" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">2. 승격 후보 제안</text>
  <text x="741" y="191" text-anchor="middle" font-size="10.5" fill="#2563EB">체크리스트, 가이드, 방법론,</text>
  <text x="741" y="207" text-anchor="middle" font-size="10.5" fill="#2563EB">컨텍스트 패키지 후보를 추천한다</text>

  <rect x="356" y="238" width="246" height="82" rx="12" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="479" y="267" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">3. 누락 축 점검</text>
  <text x="479" y="289" text-anchor="middle" font-size="10.5" fill="#059669">Decision은 많은데 근거 링크가 부족하다거나</text>
  <text x="479" y="305" text-anchor="middle" font-size="10.5" fill="#059669">특정 축이 비어 있는 구조적 빈칸을 드러낸다</text>

  <rect x="618" y="238" width="246" height="82" rx="12" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="741" y="267" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">4. 오래된 문서 리마인드</text>
  <text x="741" y="289" text-anchor="middle" font-size="10.5" fill="#059669">지금의 판단과 연결될 수 있지만</text>
  <text x="741" y="305" text-anchor="middle" font-size="10.5" fill="#059669">잊힌 문서를 다시 소환한다</text>

  <rect x="448" y="338" width="324" height="58" rx="12" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="610" y="361" text-anchor="middle" font-size="14" font-weight="bold" fill="#6D28D9">AI의 첫 번째 가치: 읽을 대상을 줄여준다</text>
  <text x="610" y="380" text-anchor="middle" font-size="10.5" fill="#7C3AED">사람이 전체를 다 읽지 않아도 볼 가치가 높은 묶음에 집중하게 만든다</text>

  <path d="M280,150 L320,150" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M280,170 C306,170 320,182 356,182" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M280,188 C306,188 320,278 356,278" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="110" y="458" width="300" height="118" rx="14" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="260" y="491" text-anchor="middle" font-size="17" font-weight="bold" fill="#B45309">사람의 최종 판단</text>
  <text x="260" y="517" text-anchor="middle" font-size="11" fill="#C2410C">이게 진짜 반복 패턴인지</text>
  <text x="260" y="535" text-anchor="middle" font-size="11" fill="#C2410C">일반화 가능한지, 적용 범위가 어디까지인지</text>
  <text x="260" y="553" text-anchor="middle" font-size="11" fill="#C2410C">최종 승격 여부를 판단한다</text>

  <rect x="540" y="458" width="300" height="118" rx="14" fill="#F0FDF4" stroke="#34D399" stroke-width="2"/>
  <text x="690" y="491" text-anchor="middle" font-size="17" font-weight="bold" fill="#047857">AI가 만든 승격 초안</text>
  <text x="690" y="517" text-anchor="middle" font-size="11" fill="#059669">체크리스트 초안</text>
  <text x="690" y="535" text-anchor="middle" font-size="11" fill="#059669">의사결정 가이드 초안</text>
  <text x="690" y="553" text-anchor="middle" font-size="11" fill="#059669">방법론 / 컨텍스트 패키지 초안</text>

  <path d="M610,396 L610,458" fill="none" stroke="#7C3AED" stroke-width="2.5" marker-end="url(#arr-purple)"/>
  <path d="M410,518 L540,518" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="120" y="606" width="720" height="28" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="480" y="625" text-anchor="middle" font-size="11" fill="#374151">좋은 Distill 루틴은 AI가 먼저 묶음과 후보를 제안하고, 사람이 패턴 승인과 적용 범위를 결정하는 식으로 역할이 분리되어 있다</text>
</svg>
