<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 540" width="960" height="540"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="#F8FAFC"/>

  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">PKM이 관리하는 네 가지와 판단 순환</text>
  <text x="480" y="58" text-anchor="middle" font-size="11" fill="#6B7280">Evidence, Decision, Result, Knowledge는 분류표가 아니라 계속 순환하는 운영 구조다</text>

  <circle cx="480" cy="270" r="78" fill="#ECFDF5" stroke="#10B981" stroke-width="3"/>
  <text x="480" y="258" text-anchor="middle" font-size="18" font-weight="bold" fill="#065F46">기획자의</text>
  <text x="480" y="282" text-anchor="middle" font-size="18" font-weight="bold" fill="#065F46">PKM</text>
  <text x="480" y="304" text-anchor="middle" font-size="11" fill="#047857">판단 인프라</text>

  <rect x="110" y="120" width="220" height="92" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2"/>
  <text x="220" y="150" text-anchor="middle" font-size="18" font-weight="bold" fill="#1D4ED8">Evidence</text>
  <text x="220" y="175" text-anchor="middle" font-size="11" fill="#2563EB">사실, 로그, 인터뷰, 관찰</text>
  <text x="220" y="193" text-anchor="middle" font-size="11" fill="#2563EB">판단의 재료</text>

  <rect x="630" y="120" width="220" height="92" rx="10" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2"/>
  <text x="740" y="150" text-anchor="middle" font-size="18" font-weight="bold" fill="#6D28D9">Decision</text>
  <text x="740" y="175" text-anchor="middle" font-size="11" fill="#7C3AED">선택, 이유, 대안, 영향</text>
  <text x="740" y="193" text-anchor="middle" font-size="11" fill="#7C3AED">설명 가능한 판단</text>

  <rect x="630" y="330" width="220" height="92" rx="10" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="740" y="360" text-anchor="middle" font-size="18" font-weight="bold" fill="#B45309">Result</text>
  <text x="740" y="385" text-anchor="middle" font-size="11" fill="#C2410C">실행 결과, 차이, 발견</text>
  <text x="740" y="403" text-anchor="middle" font-size="11" fill="#C2410C">다음 판단의 피드백</text>

  <rect x="110" y="330" width="220" height="92" rx="10" fill="#F0FDF4" stroke="#34D399" stroke-width="2"/>
  <text x="220" y="360" text-anchor="middle" font-size="18" font-weight="bold" fill="#047857">Knowledge</text>
  <text x="220" y="385" text-anchor="middle" font-size="11" fill="#059669">개념, 원리, 방법, 체크리스트</text>
  <text x="220" y="403" text-anchor="middle" font-size="11" fill="#059669">다음에도 꺼내 쓸 기준</text>

  <path d="M330,166 C410,138 520,138 630,166" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="448" y="128" text-anchor="middle" font-size="11" fill="#4B5563">근거가 판단을 만든다</text>

  <path d="M740,212 C806,236 806,304 740,330" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="830" y="276" text-anchor="middle" font-size="11" fill="#4B5563">결정이 실행을 부른다</text>

  <path d="M630,376 C566,430 402,430 330,376" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="480" y="458" text-anchor="middle" font-size="11" fill="#4B5563">반복 패턴은 지식으로 승격된다</text>

  <path d="M220,330 C134,280 134,188 220,212" fill="none" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="102" y="270" text-anchor="middle" font-size="11" fill="#4B5563">축적된 지식은</text>
  <text x="102" y="286" text-anchor="middle" font-size="11" fill="#4B5563">다음 해석 기준이 된다</text>

  <line x1="292" y1="212" x2="420" y2="246" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="668" y1="212" x2="540" y2="246" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="668" y1="330" x2="540" y2="294" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="292" y1="330" x2="420" y2="294" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,4"/>

  <rect x="180" y="474" width="600" height="36" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="480" y="497" text-anchor="middle" font-size="11" fill="#374151">PKM의 목적은 네 상자를 따로 저장하는 것이 아니라, 네 흐름을 다시 찾고 다시 설명하고 다시 쓰게 만드는 것이다</text>
</svg>
