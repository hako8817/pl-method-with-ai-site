<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arr07" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#245454"/>
    </marker>
    <style>
      .bg { fill: #f6f3ea; }
      .title { font: 700 36px Arial, sans-serif; fill: #21323a; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #5d6a71; }
      .header { font: 700 24px Arial, sans-serif; fill: #ffffff; }
      .header-sub { font: 500 14px Arial, sans-serif; fill: #d6f0ee; }
      .section { font: 700 16px Arial, sans-serif; fill: #21323a; }
      .body { font: 500 16px Arial, sans-serif; fill: #3f5058; }
      .chip { font: 600 13px Arial, sans-serif; }
      .note { font: 500 15px Arial, sans-serif; fill: #66757d; }
      .fig { font: 500 13px Arial, sans-serif; fill: #8a989e; }
      .line { stroke: #245454; stroke-width: 3.5; }
      .card-stroke { stroke: #d4dcdf; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="980" class="bg"/>

  <text x="80" y="70" class="title">산출물 지형도</text>
  <text x="80" y="104" class="subtitle">문서 수가 아니라 역할군을 본다 · 기준, 입력, 실행, 연결·운영 문서가 서로 다른 위치를 맡는다</text>

  <rect x="60" y="146" width="340" height="640" rx="22" fill="#e8f1f8" class="card-stroke"/>
  <rect x="60" y="146" width="340" height="86" rx="22" fill="#5a8db8"/>
  <text x="230" y="182" text-anchor="middle" class="header">기준 문서</text>
  <text x="230" y="208" text-anchor="middle" class="header-sub">흔들리면 안 되는 기준과 공통 지식</text>
  <text x="88" y="272" class="section">대표 문서군</text>
  <text x="92" y="308" class="body">• 용어집</text>
  <text x="92" y="342" class="body">• 공통 정책 기준</text>
  <text x="92" y="376" class="body">• 전사 또는 서비스 공통 원칙</text>
  <text x="92" y="410" class="body">• 운영 기준 문서</text>
  <line x1="88" y1="446" x2="372" y2="446" stroke="#bed0dd" stroke-width="1.5"/>
  <text x="88" y="484" class="section">이 영역의 역할</text>
  <text x="92" y="520" class="body">• 여러 과제가 함께 참조하는 공통 기준</text>
  <text x="92" y="554" class="body">• 용어와 원칙의 흔들림을 막는 기준점</text>
  <text x="92" y="588" class="body">• 뒤 문서의 해석 범위를 고정하는 출발점</text>
  <rect x="88" y="716" width="284" height="34" rx="17" fill="#5a8db8" opacity="0.14"/>
  <text x="230" y="738" text-anchor="middle" class="chip" fill="#335978">공통 기준 · 공용 지식</text>

  <rect x="440" y="146" width="340" height="640" rx="22" fill="#edf6ee" class="card-stroke"/>
  <rect x="440" y="146" width="340" height="86" rx="22" fill="#4f8b5f"/>
  <text x="610" y="182" text-anchor="middle" class="header">입력 문서</text>
  <text x="610" y="208" text-anchor="middle" class="header-sub">특정 과제를 시작하고 방향을 고정</text>
  <text x="468" y="272" class="section">대표 문서군</text>
  <text x="472" y="308" class="body">• BRD</text>
  <text x="472" y="342" class="body">• PRD</text>
  <text x="472" y="376" class="body">• 문제 정의 문서</text>
  <text x="472" y="410" class="body">• 범위 정의 문서</text>
  <line x1="468" y1="446" x2="752" y2="446" stroke="#bed6c3" stroke-width="1.5"/>
  <text x="468" y="484" class="section">이 영역의 역할</text>
  <text x="472" y="520" class="body">• 무엇을 왜 할지 과제의 방향을 고정</text>
  <text x="472" y="554" class="body">• 범위와 문제 정의를 실행 가능한 입력으로 정리</text>
  <text x="472" y="588" class="body">• 뒤 설계 문서가 출발할 기준을 명시</text>
  <rect x="468" y="716" width="284" height="34" rx="17" fill="#4f8b5f" opacity="0.14"/>
  <text x="610" y="738" text-anchor="middle" class="chip" fill="#365f41">문제 정의 · 방향 고정</text>

  <rect x="820" y="146" width="340" height="640" rx="22" fill="#fff6e8" class="card-stroke"/>
  <rect x="820" y="146" width="340" height="86" rx="22" fill="#cc8b3d"/>
  <text x="990" y="182" text-anchor="middle" class="header">실행 문서</text>
  <text x="990" y="208" text-anchor="middle" class="header-sub">정책, 흐름, 판단, 구현으로 내려감</text>
  <text x="848" y="272" class="section">대표 문서군</text>
  <text x="852" y="308" class="body">• 정책서</text>
  <text x="852" y="342" class="body">• BPMN</text>
  <text x="852" y="376" class="body">• DMN</text>
  <text x="852" y="410" class="body">• 사양서</text>
  <text x="852" y="444" class="body">• 프로토타입</text>
  <text x="852" y="478" class="body">• 테스트케이스</text>
  <line x1="848" y1="514" x2="1132" y2="514" stroke="#e0c9a7" stroke-width="1.5"/>
  <text x="848" y="552" class="section">이 영역의 역할</text>
  <text x="852" y="588" class="body">• 방향을 실제 동작과 구현 기준으로 연결</text>
  <text x="852" y="622" class="body">• 정책, 흐름, 판단, 예외를 분리</text>
  <text x="852" y="656" class="body">• 개발과 검증이 바로 참조할 수 있게 만듦</text>
  <rect x="848" y="716" width="284" height="34" rx="17" fill="#cc8b3d" opacity="0.14"/>
  <text x="990" y="738" text-anchor="middle" class="chip" fill="#835517">설계 · 구현 · 검증 기준</text>

  <rect x="1200" y="146" width="340" height="640" rx="22" fill="#f2eefc" class="card-stroke"/>
  <rect x="1200" y="146" width="340" height="86" rx="22" fill="#7b69b3"/>
  <text x="1370" y="182" text-anchor="middle" class="header">연결·운영 문서</text>
  <text x="1370" y="208" text-anchor="middle" class="header-sub">버전, 승인, 추적성, 운영 유지</text>
  <text x="1228" y="272" class="section">대표 문서군</text>
  <text x="1232" y="308" class="body">• Source of Truth 기준표</text>
  <text x="1232" y="342" class="body">• changelog</text>
  <text x="1232" y="376" class="body">• RTM</text>
  <text x="1232" y="410" class="body">• decision log</text>
  <text x="1232" y="444" class="body">• 승인/상태 관리 문서</text>
  <line x1="1228" y1="480" x2="1512" y2="480" stroke="#d4c9ea" stroke-width="1.5"/>
  <text x="1228" y="518" class="section">이 영역의 역할</text>
  <text x="1232" y="554" class="body">• 문서 체계를 추적 가능하게 유지</text>
  <text x="1232" y="588" class="body">• 변경 이력과 승인 상태를 남김</text>
  <text x="1232" y="622" class="body">• 어떤 문서가 기준인지 운영 차원에서 고정</text>
  <rect x="1228" y="716" width="284" height="34" rx="17" fill="#7b69b3" opacity="0.14"/>
  <text x="1370" y="738" text-anchor="middle" class="chip" fill="#56437f">추적 · 승인 · 운영 유지</text>

  <line x1="400" y1="466" x2="426" y2="466" class="line" marker-end="url(#arr07)"/>
  <line x1="780" y1="466" x2="806" y2="466" class="line" marker-end="url(#arr07)"/>
  <line x1="1160" y1="466" x2="1186" y2="466" class="line" marker-end="url(#arr07)"/>

  <text x="800" y="848" text-anchor="middle" class="note">기준 문서 → 입력 문서 → 실행 문서 → 연결·운영 문서</text>
  <text x="800" y="878" text-anchor="middle" class="note">문서 이름을 새로 붙이는 분류가 아니라, 전체 체인에서 맡는 위치를 보여주는 분류다</text>

  <text x="800" y="944" text-anchor="middle" class="fig">fig-07 | 산출물 지형도 — 기준, 입력, 실행, 연결·운영 문서의 4영역 지도</text>
</svg>
