<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850">
  <defs>
    <marker id="arr07" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#245454"/>
    </marker>
    <marker id="arrLoop07" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#73a4a4"/>
    </marker>
    <style>
      .t07{font:700 36px Arial,sans-serif;fill:#22313a}
      .s07{font:400 18px Arial,sans-serif;fill:#58666e}
      .hdr07{font:700 17px Arial,sans-serif;fill:#ffffff}
      .hdrsub07{font:400 13px Arial,sans-serif;fill:#aed4d4}
      .sec07{font:700 14px Arial,sans-serif;fill:#22313a}
      .itm07{font:400 15px Arial,sans-serif;fill:#3a5656}
      .bdg07{font:500 13px Arial,sans-serif}
      .fig07{font:400 13px Arial,sans-serif;fill:#9ab4b4}
      .loop07{font:400 14px Arial,sans-serif;fill:#73a4a4}
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="850" fill="#f7f5ef"/>

  <!-- Title -->
  <text x="80" y="66" class="t07">산출물 지형도</text>
  <text x="80" y="98" class="s07">기획 산출물은 역할 기준으로 4개 영역으로 구분된다 · 각 영역의 산출물은 다음 영역의 입력이 된다</text>

  <!-- ═══════════════════════════════════════════════════
       COLUMN 1: 기준 문서   x=40  w=365
       ═══════════════════════════════════════════════════ -->
  <rect x="40" y="122" width="365" height="52" rx="10" fill="#245454"/>
  <text x="222" y="145" class="hdr07" text-anchor="middle">기준 문서</text>
  <text x="222" y="164" class="hdrsub07" text-anchor="middle">전사 재사용 · 프로젝트 간 공유</text>

  <rect x="40" y="174" width="365" height="534" rx="10" fill="#eef7f7" stroke="#73a4a4" stroke-width="2.5"/>

  <text x="62" y="208" class="sec07">산출물</text>
  <line x1="60" y1="216" x2="388" y2="216" stroke="#b0d0d0" stroke-width="1"/>
  <text x="64" y="244" class="itm07">▸ 로드맵</text>
  <text x="64" y="276" class="itm07">▸ 용어집</text>
  <text x="64" y="308" class="itm07">▸ Feature Taxonomy</text>
  <text x="64" y="340" class="itm07">▸ 공통 정책</text>
  <text x="64" y="372" class="itm07">▸ 법률 / 컴플라이언스 가이드</text>

  <line x1="60" y1="395" x2="388" y2="395" stroke="#b0d0d0" stroke-width="1"/>
  <text x="62" y="418" class="sec07">역할</text>
  <text x="64" y="444" class="itm07">모든 산출물의 기준점이 된다</text>
  <text x="64" y="472" class="itm07">변경 시 전 단계 산출물에 영향</text>
  <text x="64" y="500" class="itm07">AI 초안 생성 시 기준 컨텍스트</text>
  <text x="64" y="528" class="itm07">버전 관리 · Decision Log 연동 필수</text>

  <rect x="60" y="670" width="325" height="26" rx="13" fill="#245454" opacity="0.12"/>
  <text x="222" y="687" text-anchor="middle" class="bdg07" fill="#245454">기준 · 정의 · 제약</text>

  <!-- Arrow 1→2 -->
  <line x1="405" y1="390" x2="423" y2="390" stroke="#245454" stroke-width="3.5" marker-end="url(#arr07)"/>

  <!-- ═══════════════════════════════════════════════════
       COLUMN 2: 입력 문서   x=425  w=365
       ═══════════════════════════════════════════════════ -->
  <rect x="425" y="122" width="365" height="52" rx="10" fill="#245454"/>
  <text x="607" y="145" class="hdr07" text-anchor="middle">입력 문서</text>
  <text x="607" y="164" class="hdrsub07" text-anchor="middle">문제 정의 · 범위 확정</text>

  <rect x="425" y="174" width="365" height="534" rx="10" fill="#ffffff" stroke="#245454" stroke-width="2.5"/>

  <text x="447" y="208" class="sec07">산출물</text>
  <line x1="445" y1="216" x2="773" y2="216" stroke="#a0b8b8" stroke-width="1"/>
  <text x="449" y="244" class="itm07">▸ RIB (문제 정의 · 범위 · 제약 · 이해관계자)</text>
  <text x="449" y="276" class="itm07">▸ 범위 문서</text>
  <text x="449" y="308" class="itm07">▸ 문제 근거 정리</text>

  <line x1="445" y1="330" x2="773" y2="330" stroke="#a0b8b8" stroke-width="1"/>
  <text x="447" y="353" class="sec07">역할</text>
  <text x="449" y="379" class="itm07">기획이 무엇을 왜 만드는지 확정</text>
  <text x="449" y="407" class="itm07">PRD · 정책서 작성의 입력이 된다</text>
  <text x="449" y="435" class="itm07">AI가 구조화·누락 점검 담당</text>
  <text x="449" y="463" class="itm07">PM이 범위 확정 · Input Gate 판단</text>

  <rect x="445" y="670" width="325" height="26" rx="13" fill="#245454" opacity="0.12"/>
  <text x="607" y="687" text-anchor="middle" class="bdg07" fill="#245454">범위 · 근거 · 입력</text>

  <!-- Arrow 2→3 -->
  <line x1="790" y1="390" x2="808" y2="390" stroke="#245454" stroke-width="3.5" marker-end="url(#arr07)"/>

  <!-- ═══════════════════════════════════════════════════
       COLUMN 3: 실행 문서   x=810  w=365
       ═══════════════════════════════════════════════════ -->
  <rect x="810" y="122" width="365" height="52" rx="10" fill="#245454"/>
  <text x="992" y="145" class="hdr07" text-anchor="middle">실행 문서</text>
  <text x="992" y="164" class="hdrsub07" text-anchor="middle">설계 · 개발 연결 · 검증</text>

  <rect x="810" y="174" width="365" height="534" rx="10" fill="#eef7f7" stroke="#245454" stroke-width="2.5"/>

  <text x="832" y="208" class="sec07">산출물</text>
  <line x1="830" y1="216" x2="1158" y2="216" stroke="#a0c8c8" stroke-width="1"/>
  <text x="834" y="244" class="itm07">▸ PRD (방향 · 시나리오 · 성공 기준)</text>
  <text x="834" y="274" class="itm07">▸ Feature · Scenario · AC</text>
  <text x="834" y="304" class="itm07">▸ 정책서 (규칙 · 예외 · 엣지케이스)</text>
  <text x="834" y="334" class="itm07">▸ BPMN (프로세스 흐름)</text>
  <text x="834" y="364" class="itm07">▸ DMN (판단 규칙)</text>
  <text x="834" y="394" class="itm07">▸ 사양서 / 프로토타입</text>
  <text x="834" y="424" class="itm07">▸ 테스트케이스</text>

  <line x1="830" y1="445" x2="1158" y2="445" stroke="#a0c8c8" stroke-width="1"/>
  <text x="832" y="468" class="sec07">역할</text>
  <text x="834" y="494" class="itm07">산출물 체인의 핵심 구간</text>
  <text x="834" y="520" class="itm07">각 산출물이 다음 산출물의 입력</text>

  <rect x="830" y="670" width="325" height="26" rx="13" fill="#245454" opacity="0.12"/>
  <text x="992" y="687" text-anchor="middle" class="bdg07" fill="#245454">설계 · 흐름 · 구현 조건</text>

  <!-- Arrow 3→4 -->
  <line x1="1175" y1="390" x2="1193" y2="390" stroke="#245454" stroke-width="3.5" marker-end="url(#arr07)"/>

  <!-- ═══════════════════════════════════════════════════
       COLUMN 4: 연결 / 운영 문서   x=1195  w=365
       ═══════════════════════════════════════════════════ -->
  <rect x="1195" y="122" width="365" height="52" rx="10" fill="#245454"/>
  <text x="1377" y="145" class="hdr07" text-anchor="middle">연결 / 운영 문서</text>
  <text x="1377" y="164" class="hdrsub07" text-anchor="middle">추적 · 이력 · 다음 입력</text>

  <rect x="1195" y="174" width="365" height="534" rx="10" fill="#fff5e8" stroke="#d29a52" stroke-width="2.5"/>

  <text x="1217" y="208" class="sec07">산출물</text>
  <line x1="1215" y1="216" x2="1543" y2="216" stroke="#dbb888" stroke-width="1"/>
  <text x="1219" y="244" class="itm07">▸ RTM (요구사항 ↔ TC 연결 추적)</text>
  <text x="1219" y="276" class="itm07">▸ Decision Log (판단 근거 기록)</text>
  <text x="1219" y="308" class="itm07">▸ Changelog (변경 이력)</text>
  <text x="1219" y="340" class="itm07">▸ FAQ / 운영 가이드</text>
  <text x="1219" y="372" class="itm07">▸ 릴리스 노트</text>
  <text x="1219" y="404" class="itm07">▸ 하네스 카드 (AI 작업 계약)</text>

  <line x1="1215" y1="427" x2="1543" y2="427" stroke="#dbb888" stroke-width="1"/>
  <text x="1217" y="450" class="sec07">역할</text>
  <text x="1219" y="476" class="itm07">체인 연결 유지 · 추적 장치</text>
  <text x="1219" y="504" class="itm07">운영 이슈 → 다음 RIB 입력</text>
  <text x="1219" y="532" class="itm07">AI 속도 시대 — 추적 없으면 체인 끊김</text>

  <rect x="1215" y="670" width="325" height="26" rx="13" fill="#d29a52" opacity="0.14"/>
  <text x="1377" y="687" text-anchor="middle" class="bdg07" fill="#7a5010">추적 · 운영 · 다음 사이클</text>

  <!-- ═══════════════════════════════════════════════════
       FEEDBACK LOOP
       ═══════════════════════════════════════════════════ -->
  <path d="M 1377 720 Q 1377 790 990 790 Q 607 790 607 720"
        fill="none" stroke="#73a4a4" stroke-width="2" stroke-dasharray="8 5"
        marker-end="url(#arrLoop07)"/>
  <text x="990" y="782" text-anchor="middle" class="loop07">운영 이슈 → 다음 RIB / PRD 입력 (순환)</text>

  <!-- Fig label -->
  <text x="800" y="838" text-anchor="middle" class="fig07">fig-07 | 산출물 지형도 — 역할 기준 4영역 분류</text>
