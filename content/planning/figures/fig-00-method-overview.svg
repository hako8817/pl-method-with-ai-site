<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow00" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35523c"/>
    </marker>
    <style>
      .title{font:700 38px Arial,sans-serif;fill:#22313a}
      .subtitle{font:500 20px Arial,sans-serif;fill:#58666e}
      .head{font:700 22px Arial,sans-serif;fill:#22313a}
      .body{font:500 16px Arial,sans-serif;fill:#58666e}
      .small{font:500 14px Arial,sans-serif;fill:#7b8790}
      .box{fill:#ffffff;stroke:#35523c;stroke-width:2.8}
      .sub{fill:#f2f7f2;stroke:#8aab92;stroke-width:2.2}
      .accent{fill:#fbf3e7;stroke:#b88d51;stroke-width:2.2}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#f7f5ef"/>
  <text x="90" y="90" class="title">AI를 이용한 기획 업무 방법론 개요</text>
  <text x="90" y="126" class="subtitle">기준 문서를 정리하고, 입력 구조를 설계하고, 실행 산출물을 체인으로 연결해 검증과 운영까지 이어가는 구조</text>

  <rect x="90" y="190" width="250" height="190" rx="22" class="box"/>
  <text x="126" y="232" class="head">1. 기준 문서 정리</text>
  <text x="118" y="268" class="body">로드맵</text>
  <text x="118" y="294" class="body">용어집</text>
  <text x="118" y="320" class="body">Feature Taxonomy</text>
  <text x="118" y="346" class="body">공통 정책 / Source of Truth</text>

  <rect x="390" y="190" width="250" height="190" rx="22" class="box"/>
  <text x="430" y="232" class="head">2. 입력 구조 설계</text>
  <text x="418" y="268" class="body">RIB</text>
  <text x="418" y="294" class="body">문제 / 범위 / 제약</text>
  <text x="418" y="320" class="body">이해관계자</text>
  <text x="418" y="346" class="body">확인 필요 사항</text>

  <rect x="690" y="190" width="300" height="190" rx="22" class="box"/>
  <text x="736" y="232" class="head">3. 실행 산출물 작성</text>
  <text x="718" y="268" class="body">PRD / 정책서 / BPMN / DMN</text>
  <text x="718" y="294" class="body">사양서 / 프로토타입</text>
  <text x="718" y="320" class="body">테스트케이스</text>
  <text x="718" y="346" class="body">기능 분해와 구현 기준</text>

  <rect x="1040" y="190" width="250" height="190" rx="22" class="box"/>
  <text x="1071" y="232" class="head">4. 연결과 검증</text>
  <text x="1068" y="268" class="body">Input Gate / DoR / DoD</text>
  <text x="1068" y="294" class="body">RTM</text>
  <text x="1068" y="320" class="body">Decision Log</text>
  <text x="1068" y="346" class="body">Changelog</text>

  <rect x="1340" y="190" width="170" height="190" rx="22" class="box"/>
  <text x="1378" y="232" class="head">5. 운영 적용</text>
  <text x="1368" y="268" class="body">Jira</text>
  <text x="1368" y="294" class="body">Confluence</text>
  <text x="1368" y="320" class="body">Figma / Git</text>
  <text x="1368" y="346" class="body">RAG / Agent</text>

  <line x1="340" y1="285" x2="390" y2="285" stroke="#35523c" stroke-width="4" marker-end="url(#arrow00)"/>
  <line x1="640" y1="285" x2="690" y2="285" stroke="#35523c" stroke-width="4" marker-end="url(#arrow00)"/>
  <line x1="990" y1="285" x2="1040" y2="285" stroke="#35523c" stroke-width="4" marker-end="url(#arrow00)"/>
  <line x1="1290" y1="285" x2="1340" y2="285" stroke="#35523c" stroke-width="4" marker-end="url(#arrow00)"/>

  <rect x="120" y="470" width="470" height="180" rx="20" class="sub"/>
  <text x="150" y="512" class="head">핵심 메시지</text>
  <text x="150" y="548" class="body">이 책의 방법론은 좋은 문장을 쓰는 법이 아니라</text>
  <text x="150" y="576" class="body">AI가 다음 단계로 읽고 변환할 수 있도록</text>
  <text x="150" y="604" class="body">산출물 구조와 연결 규칙을 재설계하는 법이다.</text>

  <rect x="640" y="470" width="430" height="180" rx="20" class="accent"/>
  <text x="670" y="512" class="head">BPMN / DMN 원칙</text>
  <text x="670" y="548" class="body">흐름은 BPMN으로, 판단은 DMN으로 분리한다.</text>
  <text x="670" y="576" class="body">정책은 규칙과 예외를 정리하고,</text>
  <text x="670" y="604" class="body">사양과 테스트는 이를 구현/검증 기준으로 번역한다.</text>

  <rect x="1120" y="470" width="350" height="180" rx="20" class="sub"/>
  <text x="1150" y="512" class="head">결과</text>
  <text x="1150" y="548" class="body">문서 간 중복 감소</text>
  <text x="1150" y="576" class="body">누락과 해석 차이 축소</text>
  <text x="1150" y="604" class="body">팀 운영과 AI 자동화 연결</text>
</svg>



