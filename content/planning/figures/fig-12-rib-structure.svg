<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow12" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#245454"/>
    </marker>
    <style>
      .title{font:700 38px Arial,sans-serif;fill:#22313a}
      .subtitle{font:500 20px Arial,sans-serif;fill:#58666e}
      .head{font:700 22px Arial,sans-serif;fill:#22313a}
      .body{font:500 16px Arial,sans-serif;fill:#58666e}
      .box-title{font:700 22px Arial,sans-serif;fill:#22313a}
      .box-text{font:500 16px Arial,sans-serif;fill:#58666e}
      .label{font:500 15px Arial,sans-serif;fill:#7b8790}
      .main{fill:#ffffff;stroke:#245454;stroke-width:3}
      .input{fill:#eef7f7;stroke:#73a4a4;stroke-width:2.5}
      .output{fill:#fff5e8;stroke:#d29a52;stroke-width:2.5}
      .rib{fill:#ffffff;stroke:#245454;stroke-width:3}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#f7f5ef"/>

  <!-- Title -->
  <text x="90" y="80" class="title">RIB 구조: 입력 수집 → 문제 정의 → PRD 입력</text>
  <text x="90" y="116" class="subtitle">Requirements Input Brief — PM이 요구사항 수집 단계에서 정리하는 최소 기준 문서</text>

  <!-- INPUT COLUMN -->
  <rect x="60" y="160" width="260" height="560" rx="16" class="input"/>
  <text x="190" y="200" text-anchor="middle" class="head">입력 원천</text>

  <rect x="85" y="220" width="210" height="70" rx="10" fill="#d4ede9" stroke="#73a4a4" stroke-width="1.5"/>
  <text x="190" y="253" text-anchor="middle" class="box-title">사용자 피드백</text>
  <text x="190" y="275" text-anchor="middle" class="box-text">VOC·CS·인터뷰</text>

  <rect x="85" y="310" width="210" height="70" rx="10" fill="#d4ede9" stroke="#73a4a4" stroke-width="1.5"/>
  <text x="190" y="343" text-anchor="middle" class="box-title">비즈니스 요구</text>
  <text x="190" y="365" text-anchor="middle" class="box-text">전략·OKR·시장 변화</text>

  <rect x="85" y="400" width="210" height="70" rx="10" fill="#d4ede9" stroke="#73a4a4" stroke-width="1.5"/>
  <text x="190" y="433" text-anchor="middle" class="box-title">운영 이슈</text>
  <text x="190" y="455" text-anchor="middle" class="box-text">예외·장애·운영 부담</text>

  <rect x="85" y="490" width="210" height="70" rx="10" fill="#d4ede9" stroke="#73a4a4" stroke-width="1.5"/>
  <text x="190" y="523" text-anchor="middle" class="box-title">기술 제약</text>
  <text x="190" y="545" text-anchor="middle" class="box-text">레거시·인프라·보안</text>

  <rect x="85" y="580" width="210" height="70" rx="10" fill="#d4ede9" stroke="#73a4a4" stroke-width="1.5"/>
  <text x="190" y="613" text-anchor="middle" class="box-title">규제·정책 변화</text>
  <text x="190" y="635" text-anchor="middle" class="box-text">법률·컴플라이언스</text>

  <!-- Arrow: Input → RIB -->
  <line x1="322" y1="440" x2="420" y2="440" stroke="#245454" stroke-width="3" marker-end="url(#arrow12)"/>
  <text x="371" y="430" text-anchor="middle" class="label">수집·정리</text>

  <!-- RIB CENTER -->
  <rect x="420" y="160" width="760" height="560" rx="16" class="rib"/>
  <text x="800" y="200" text-anchor="middle" class="head">RIB (Requirements Input Brief)</text>
  <text x="800" y="224" text-anchor="middle" class="label">PM이 다음 단계로 넘기기 전 정리하는 최소 입력 기준 문서</text>

  <!-- RIB Section 1 -->
  <rect x="450" y="245" width="220" height="440" rx="12" fill="#f0f8f6" stroke="#245454" stroke-width="2"/>
  <text x="560" y="280" text-anchor="middle" class="box-title">문제 정의</text>
  <text x="560" y="308" text-anchor="middle" class="box-text">누구의</text>
  <text x="560" y="330" text-anchor="middle" class="box-text">어떤 문제인가</text>
  <text x="560" y="370" text-anchor="middle" class="label">— 사용자 Pain Point</text>
  <text x="560" y="392" text-anchor="middle" class="label">— 현재 상태 vs 목표</text>
  <text x="560" y="414" text-anchor="middle" class="label">— 측정 가능한 기준</text>
  <text x="560" y="460" text-anchor="middle" class="box-text">배경·맥락</text>
  <text x="560" y="500" text-anchor="middle" class="label">— 과거 시도 이력</text>
  <text x="560" y="522" text-anchor="middle" class="label">— 비즈니스 임팩트</text>
  <text x="560" y="560" text-anchor="middle" class="box-text">성공 기준</text>
  <text x="560" y="600" text-anchor="middle" class="label">— 정량 지표</text>
  <text x="560" y="622" text-anchor="middle" class="label">— 검증 방법</text>

  <!-- RIB Section 2 -->
  <rect x="690" y="245" width="220" height="440" rx="12" fill="#f0f8f6" stroke="#245454" stroke-width="2"/>
  <text x="800" y="280" text-anchor="middle" class="box-title">범위 결정</text>
  <text x="800" y="308" text-anchor="middle" class="box-text">이번에 할 것</text>
  <text x="800" y="348" text-anchor="middle" class="label">— 핵심 시나리오</text>
  <text x="800" y="370" text-anchor="middle" class="label">— 포함 기능 목록</text>
  <text x="800" y="392" text-anchor="middle" class="label">— 최소 범위 기준</text>
  <text x="800" y="430" text-anchor="middle" class="box-text">이번에 안 할 것</text>
  <text x="800" y="470" text-anchor="middle" class="label">— 명시적 제외 항목</text>
  <text x="800" y="492" text-anchor="middle" class="label">— 다음 단계 후보</text>
  <text x="800" y="540" text-anchor="middle" class="box-text">이해관계자</text>
  <text x="800" y="580" text-anchor="middle" class="label">— 의사결정자</text>
  <text x="800" y="602" text-anchor="middle" class="label">— 협업 팀</text>

  <!-- RIB Section 3 -->
  <rect x="930" y="245" width="220" height="440" rx="12" fill="#f0f8f6" stroke="#245454" stroke-width="2"/>
  <text x="1040" y="280" text-anchor="middle" class="box-title">제약 명시</text>
  <text x="1040" y="308" text-anchor="middle" class="box-text">기술 제약</text>
  <text x="1040" y="348" text-anchor="middle" class="label">— 시스템 의존성</text>
  <text x="1040" y="370" text-anchor="middle" class="label">— 레거시 호환</text>
  <text x="1040" y="410" text-anchor="middle" class="box-text">일정 제약</text>
  <text x="1040" y="450" text-anchor="middle" class="label">— 출시 목표일</text>
  <text x="1040" y="472" text-anchor="middle" class="label">— 마일스톤</text>
  <text x="1040" y="510" text-anchor="middle" class="box-text">리소스 제약</text>
  <text x="1040" y="550" text-anchor="middle" class="label">— 팀 규모·역량</text>
  <text x="1040" y="572" text-anchor="middle" class="label">— 예산</text>
  <text x="1040" y="612" text-anchor="middle" class="box-text">규제·정책</text>
  <text x="1040" y="640" text-anchor="middle" class="label">— 법적 요건</text>

  <!-- Arrow: RIB → Output -->
  <line x1="1182" y1="440" x2="1280" y2="440" stroke="#245454" stroke-width="3" marker-end="url(#arrow12)"/>
  <text x="1231" y="430" text-anchor="middle" class="label">PRD 입력</text>

  <!-- OUTPUT COLUMN -->
  <rect x="1280" y="160" width="260" height="560" rx="16" class="output"/>
  <text x="1410" y="200" text-anchor="middle" class="head">다음 산출물</text>

  <rect x="1305" y="220" width="210" height="70" rx="10" fill="#fce8c8" stroke="#d29a52" stroke-width="1.5"/>
  <text x="1410" y="253" text-anchor="middle" class="box-title">PRD</text>
  <text x="1410" y="275" text-anchor="middle" class="box-text">방향·범위·성공 기준</text>

  <rect x="1305" y="310" width="210" height="70" rx="10" fill="#fce8c8" stroke="#d29a52" stroke-width="1.5"/>
  <text x="1410" y="343" text-anchor="middle" class="box-title">정책서</text>
  <text x="1410" y="365" text-anchor="middle" class="box-text">규칙·예외·정책 구조</text>

  <rect x="1305" y="400" width="210" height="70" rx="10" fill="#fce8c8" stroke="#d29a52" stroke-width="1.5"/>
  <text x="1410" y="433" text-anchor="middle" class="box-title">BPMN</text>
  <text x="1410" y="455" text-anchor="middle" class="box-text">업무 흐름 구조화</text>

  <!-- Bottom note -->
  <text x="800" y="840" text-anchor="middle" class="label">RIB는 PRD 작성 전 PM이 정리하는 최소 입력 기준 문서다. 모호한 RIB는 모호한 PRD를 만들고, 모호한 PRD는 전체 산출물 체인을 불안정하게 만든다.</text>
</svg>
