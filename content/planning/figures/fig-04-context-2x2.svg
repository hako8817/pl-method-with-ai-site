<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title{font:700 38px Arial,sans-serif;fill:#22313a}
      .subtitle{font:500 20px Arial,sans-serif;fill:#58666e}
      .head{font:700 22px Arial,sans-serif;fill:#22313a}
      .body{font:500 16px Arial,sans-serif;fill:#58666e}
      .axis{font:500 18px Arial,sans-serif;fill:#58666e}
      .small{font:500 14px Arial,sans-serif;fill:#7b8790}
      .cellA{fill:#f4f7ff;stroke:#8fa1c7;stroke-width:2.4}
      .cellB{fill:#eef7f2;stroke:#88aa97;stroke-width:2.4}
      .cellC{fill:#fff6eb;stroke:#d1a265;stroke-width:2.4}
      .cellD{fill:#f8f1fb;stroke:#a889bf;stroke-width:2.4}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#f7f5ef"/>
  <text x="90" y="90" class="title">기획 업무의 2x2 맥락 구분</text>
  <text x="90" y="126" class="subtitle">같은 기획이라도 과제 맥락에 따라 산출물의 시작점과 무게중심이 달라진다.</text>

  <line x1="300" y1="220" x2="300" y2="760" stroke="#8a949b" stroke-width="3"/>
  <line x1="300" y1="760" x2="1360" y2="760" stroke="#8a949b" stroke-width="3"/>
  <line x1="830" y1="220" x2="830" y2="760" stroke="#8a949b" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="300" y1="490" x2="1360" y2="490" stroke="#8a949b" stroke-width="2" stroke-dasharray="8 8"/>

  <text x="620" y="808" class="axis">신규 구축</text>
  <text x="1040" y="808" class="axis">고도화·운영</text>
  <text x="120" y="395" class="axis" transform="rotate(-90 120 395)">자사 서비스(Product)</text>
  <text x="120" y="675" class="axis" transform="rotate(-90 120 675)">수주형(SI/에이전시)</text>

  <rect x="360" y="250" width="420" height="190" rx="22" class="cellA"/>
  <text x="390" y="290" class="head">자사 서비스 + 신규 구축</text>
  <text x="390" y="326" class="body">- 문제 정의</text>
  <text x="390" y="354" class="body">- MVP</text>
  <text x="390" y="382" class="body">- 가설 검증</text>
  <text x="390" y="410" class="body">- 핵심 시나리오</text>

  <rect x="880" y="250" width="420" height="190" rx="22" class="cellB"/>
  <text x="910" y="290" class="head">자사 서비스 + 고도화·운영</text>
  <text x="910" y="326" class="body">- 정책 정합성</text>
  <text x="910" y="354" class="body">- 레거시 개선</text>
  <text x="910" y="382" class="body">- 예외 처리</text>
  <text x="910" y="410" class="body">- 운영 / FAQ</text>

  <rect x="360" y="530" width="420" height="190" rx="22" class="cellC"/>
  <text x="390" y="570" class="head">수주형 + 신규 구축</text>
  <text x="390" y="606" class="body">- 제안서</text>
  <text x="390" y="634" class="body">- 범위 / 검수 기준</text>
  <text x="390" y="662" class="body">- WBS</text>
  <text x="390" y="690" class="body">- 계약 / 승인</text>

  <rect x="880" y="530" width="420" height="190" rx="22" class="cellD"/>
  <text x="910" y="570" class="head">수주형 + 고도화·운영</text>
  <text x="910" y="606" class="body">- 변경 요청</text>
  <text x="910" y="634" class="body">- 영향도 분석</text>
  <text x="910" y="662" class="body">- 검수 / 인수 기준</text>
  <text x="910" y="690" class="body">- 운영 매뉴얼</text>
</svg>
